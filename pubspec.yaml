name: korassa_mobile
description: Korassa Financial Management mobile app.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  file_picker: ^10.1.9
  file_saver: ^0.3.1
  flutter_bloc: ^9.1.1
  google_sign_in: ^6.2.2
  googleapis: ^13.2.0
  http: ^1.2.2
  intl: ^0.20.2
  shared_preferences: ^2.5.3
  share_plus: ^12.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2

flutter:
  uses-material-design: true

  fonts:
    - family: IBM Plex Sans Arabic
      fonts:
        - asset: assets/fonts/IBMPlexSansArabic-Regular.ttf
        - asset: assets/fonts/IBMPlexSansArabic-Medium.ttf
        - asset: assets/fonts/IBMPlexSansArabic-Bold.ttf